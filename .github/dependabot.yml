version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["development"]
    groups:
      python-dependencies:
        patterns:
          - "*"
  
  - package-ecosystem: "npm"
    directory: '/ui-v2/'
    schedule:
      interval: "weekly"
    labels: ["ui-replatform", "ui-v2-dependency"]
    groups:
      # This is the name of your group, it will be used in PR titles and branch names
      eslint:
        patterns:
          - "@eslint*"
          - "@tanstack/eslint-plugin-*"
          - "eslint*"
          - "typescript"
          - "typescript-eslint"
      biome:
        patterns:
          - "@biomejs/biome"
      ui-v2-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@biomejs/biome"
          - "@eslint*"
          - "@tanstack/eslint-plugin-*"
          - "eslint*"
          - "typescript"
          - "typescript-eslint"
    # Remove or raise the bound when the lint stack's peer ranges support it.
    ignore:
      - dependency-name: "typescript"
        versions:
          - ">=6.1.0"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels: ["development"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    labels: ["development"]

  # update uv.lock file
  - package-ecosystem: "uv" 
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    labels: ["development"]
    groups:
      uv-dependencies:
        patterns:
          - "*"
