name: Windows Tests

on:
  workflow_dispatch:
    inputs:
      repro_worker_only:
        description: "Run only the long-running Windows worker repro"
        required: true
        type: boolean
        default: true
      repro_python_version:
        description: "Python version for the worker repro"
        required: true
        default: "3.12.5"
      repro_prefect_version:
        description: "Prefect version for the worker repro, or 'local' for this checkout"
        required: true
        default: "3.7.1"
      repro_duration_minutes:
        description: "Worker repro duration; GitHub-hosted runners max at 360 minutes"
        required: true
        default: "350"
      repro_monitor_interval_seconds:
        description: "Seconds between worker health/API observations"
        required: true
        default: "60"
  pull_request:
    paths:
      - "pyproject.toml"
      - "src/prefect/testing/**/*.py"
      - "tests/testing/**/*.py"
      - "src/prefect/utilities/processutils/**/*.py"
      - "src/prefect/cli/work_pool.py"
      - "src/prefect/flows.py"
      - "src/prefect/runner/runner.py"
      - "src/prefect/runner/_starter_engine.py"
      - "src/prefect/cli/server.py"
      - "src/prefect/workers/base.py"
      - "src/prefect/workers/process.py"
      - "scripts/repro_windows_worker.py"
      - "scripts/test_unc_paths.py"
      - "tests/cli/test_work_pool.py"
      - "tests/runner/test__starter_engine.py"
      - "tests/runner/test_runner.py"
      - "tests/test_infrastructure_bound_flow.py"
      - "tests/utilities/test_processutils.py"
      - "tests/workers/test_base_worker.py"
      - ".github/workflows/windows-tests.yaml"

permissions: {}

jobs:
  run-tests-sqlite:
    name: Test with SQLite
    if: github.event_name != 'workflow_dispatch' || inputs.repro_worker_only != true

    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          # Python 3.14 is excluded because asyncpg doesn't compile on Windows

      fail-fast: true

    permissions:
      contents: read

    runs-on: windows-latest
    timeout-minutes: 10

    env:
      # enable colored output
      PY_COLORS: 1

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          filter: blob:none

      - name: Set up uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          cache-dependency-glob: "pyproject.toml"

      - name: Run Windows-specific tests
        run: |
          # Only run tests marked with @pytest.mark.windows
          uv run pytest tests -vv -m windows --durations=25

  test-unc-paths:
    name: Test Windows UNC Paths
    # Only run this job when triggered manually
    if: github.event_name == 'workflow_dispatch' && inputs.repro_worker_only != true

    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          filter: blob:none

      - name: Set up Python
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
          cache-dependency-glob: "pyproject.toml"

      - name: Create test UNC path and run flow
        shell: pwsh
        run: |
          # Create a test directory
          New-Item -ItemType Directory -Path "C:\ShareTest" -Force

          # Create network share
          New-SmbShare -Name "PrefectTest" -Path "C:\ShareTest" -FullAccess "Everyone"

          # Run the test script from the current directory
          uv run scripts/test_unc_paths.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          Remove-SmbShare -Name "PrefectTest" -Force

  repro-worker:
    name: Repro worker liveness
    if: github.event_name == 'workflow_dispatch' && inputs.repro_worker_only == true

    runs-on: windows-latest
    timeout-minutes: 360

    env:
      PREFECT_API_URL: http://127.0.0.1:4200/api
      PY_COLORS: 1

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1
          filter: blob:none

      - name: Set up uv and Python ${{ inputs.repro_python_version }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ inputs.repro_python_version }}
          cache-dependency-glob: "pyproject.toml"

      - name: Run released Prefect repro
        if: ${{ inputs.repro_prefect_version != 'local' }}
        shell: pwsh
        run: |
          $requirements = @(
            "--no-project",
            "--python", "${{ inputs.repro_python_version }}",
            "--with", "prefect==${{ inputs.repro_prefect_version }}",
            "--with", "httpx",
            "--with", "importlib-metadata"
          )
          $scriptArgs = @(
            "scripts/repro_windows_worker.py",
            "--duration-minutes", "${{ inputs.repro_duration_minutes }}",
            "--monitor-interval-seconds", "${{ inputs.repro_monitor_interval_seconds }}",
            "--worker-log-path", "worker.log"
          )

          $server = Start-Process `
            -FilePath "uv" `
            -ArgumentList (@("run") + $requirements + @("prefect", "server", "start", "--analytics-off", "--host", "127.0.0.1")) `
            -RedirectStandardOutput "server.log" `
            -RedirectStandardError "server-error.log" `
            -PassThru `
            -NoNewWindow

          try {
            uv run @requirements scripts/wait-for-server.py
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            uv run @requirements @scriptArgs
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } finally {
            if (-not $server.HasExited) {
              Stop-Process -Id $server.Id -Force
            }
          }

      - name: Install local checkout
        if: ${{ inputs.repro_prefect_version == 'local' }}
        run: uv sync --locked

      - name: Run local checkout repro
        if: ${{ inputs.repro_prefect_version == 'local' }}
        shell: pwsh
        run: |
          $scriptArgs = @(
            "scripts/repro_windows_worker.py",
            "--duration-minutes", "${{ inputs.repro_duration_minutes }}",
            "--monitor-interval-seconds", "${{ inputs.repro_monitor_interval_seconds }}",
            "--worker-log-path", "worker.log"
          )

          $server = Start-Process `
            -FilePath "uv" `
            -ArgumentList @("run", "prefect", "server", "start", "--analytics-off", "--host", "127.0.0.1") `
            -RedirectStandardOutput "server.log" `
            -RedirectStandardError "server-error.log" `
            -PassThru `
            -NoNewWindow

          try {
            uv run scripts/wait-for-server.py
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            uv run @scriptArgs
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } finally {
            if (-not $server.HasExited) {
              Stop-Process -Id $server.Id -Force
            }
          }

      - name: Upload repro logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: windows-worker-repro-logs
          path: |
            worker.log
            server.log
            server-error.log
          if-no-files-found: ignore
