name: Update AGENTS.md files

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/AGENTS.md"
      - ".github/workflows/**"
      - "uv.lock"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: agents-md-update
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-agents-md:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for code changes
        id: changes
        run: |
          # Use the full push range to catch all commits, not just the last one.
          # For workflow_dispatch, fall back to diffing against the previous commit.
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi

          CHANGED=$(git diff --name-only "$BASE" HEAD \
            -- . \
            ':(exclude)**/AGENTS.md' \
            ':(exclude).github/workflows/**' \
            ':(exclude)uv.lock')
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No code changes detected, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            echo "$CHANGED"
            # Save filtered diff for Claude and changed file list for PR body
            git diff "$BASE" HEAD \
              -- . \
              ':(exclude)**/AGENTS.md' \
              ':(exclude).github/workflows/**' \
              ':(exclude)uv.lock' > /tmp/diff.patch
            echo "$CHANGED" > /tmp/changed-files.txt
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Run Claude Code
        if: steps.changes.outputs.skip != 'true'
        timeout-minutes: 15
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          PROMPT='You are updating AGENTS.md files in the Prefect repository after a merge to main.

          Read the skill file at .claude/skills/agents-md-sync/SKILL.md and follow its workflow exactly.

          The diff from the latest push is saved at /tmp/diff.patch — read that file.
          Apply any needed AGENTS.md updates directly. If none are needed, do nothing.'

          npx -y @anthropic-ai/claude-code --print \
            --dangerously-skip-permissions \
            --max-turns 30 \
            --model sonnet \
            "$PROMPT"

      - name: Check for changes
        if: steps.changes.outputs.skip != 'true'
        id: diff
        run: |
          git add '**/AGENTS.md'
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No AGENTS.md changes needed."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "AGENTS.md changes detected:"
            git diff --cached --name-only
          fi

      - name: Create pull request
        if: steps.changes.outputs.skip != 'true' && steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH="claude/update-agents-md-${SHORT_SHA}"
          CHANGED_FILES=$(cat /tmp/changed-files.txt)

          # Build a descriptive PR title from the list of updated AGENTS.md files
          # so reviewers can tell at a glance which files are being updated.
          UPDATED_AGENTS=$(git diff --cached --name-only)
          UPDATED_COUNT=$(echo "$UPDATED_AGENTS" | wc -l | tr -d ' ')
          if [ "$UPDATED_COUNT" -eq 1 ]; then
            PR_TITLE="docs: update ${UPDATED_AGENTS}"
          elif [ "$UPDATED_COUNT" -le 3 ]; then
            # Show the parent directory of each AGENTS.md so the title stays short.
            DIRS=$(echo "$UPDATED_AGENTS" | sed -e 's|/AGENTS\.md$||' -e 's|^AGENTS\.md$|(root)|' | tr '\n' ',' | sed 's/,$//; s/,/, /g')
            PR_TITLE="docs: update AGENTS.md in ${DIRS}"
          else
            PR_TITLE="docs: update ${UPDATED_COUNT} AGENTS.md files"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git commit -m "$PR_TITLE"
          git push origin "$BRANCH"

          PR_BODY="Automated AGENTS.md update triggered by commit ${GITHUB_SHA}.

          This PR was generated by Claude Code analyzing the diff from the latest push to main and updating any stale AGENTS.md files.

          <details>
          <summary>Changed files in triggering push</summary>

          \`\`\`
          ${CHANGED_FILES}
          \`\`\`
          </details>"

          gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH"
