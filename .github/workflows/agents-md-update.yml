name: Update AGENTS.md files

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/AGENTS.md"
      - "**/CLAUDE.md"
      - ".github/workflows/**"
      - "uv.lock"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: agents-md-update
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-agents-md:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for code changes
        id: changes
        run: |
          # Get files changed in the push commit, excluding non-code files
          DIFF_EXCLUSIONS="-- \
            ':(exclude)**/AGENTS.md' \
            ':(exclude)**/CLAUDE.md' \
            ':(exclude).github/workflows/**' \
            ':(exclude)uv.lock'"

          CHANGED=$(eval git diff --name-only HEAD~1 HEAD $DIFF_EXCLUSIONS)
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No code changes detected, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            echo "$CHANGED"
            # Save filtered diff for Claude and changed file list for PR body
            eval git diff HEAD~1 HEAD $DIFF_EXCLUSIONS > /tmp/diff.patch
            echo "$CHANGED" > /tmp/changed-files.txt
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Run Claude Code
        if: steps.changes.outputs.skip != 'true'
        timeout-minutes: 15
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          PROMPT='You are updating AGENTS.md files in the Prefect repository after a merge to main.

Read the skill file at .claude/skills/agents-md-sync/SKILL.md and follow its workflow exactly.

The diff from the latest push is saved at /tmp/diff.patch — read that file.
Apply any needed AGENTS.md updates directly. If none are needed, do nothing.'

          npx -y @anthropic-ai/claude-code --print \
            --dangerously-skip-permissions \
            --max-turns 30 \
            --model sonnet \
            "$PROMPT"

      - name: Check for changes
        if: steps.changes.outputs.skip != 'true'
        id: diff
        run: |
          git add '**/AGENTS.md'
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No AGENTS.md changes needed."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "AGENTS.md changes detected:"
            git diff --cached --name-only
          fi

      - name: Run symlink script
        if: steps.changes.outputs.skip != 'true' && steps.diff.outputs.has_changes == 'true'
        run: |
          chmod +x .claude/hooks/symlink-agents-to-claude.sh
          .claude/hooks/symlink-agents-to-claude.sh
          git add '**/CLAUDE.md'

      - name: Create pull request
        if: steps.changes.outputs.skip != 'true' && steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH="claude/update-agents-md-${SHORT_SHA}"
          CHANGED_FILES=$(cat /tmp/changed-files.txt)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git commit -m "Update AGENTS.md files for ${SHORT_SHA}"
          git push origin "$BRANCH"

          PR_BODY="Automated AGENTS.md update triggered by commit ${GITHUB_SHA}.

This PR was generated by Claude Code analyzing the diff from the latest push to main and updating any stale AGENTS.md files.

<details>
<summary>Changed files in triggering commit</summary>

\`\`\`
${CHANGED_FILES}
\`\`\`
</details>"

          gh pr create \
            --title "Update AGENTS.md files for ${SHORT_SHA}" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH"
