name: Update AGENTS.md files

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/AGENTS.md"
      - ".github/workflows/**"
      - "uv.lock"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: agents-md-update
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-agents-md:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for code changes
        id: changes
        run: |
          # Use the full push range to catch all commits, not just the last one.
          # For workflow_dispatch, fall back to diffing against the previous commit.
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi

          CHANGED=$(git diff --name-only "$BASE" HEAD \
            -- . \
            ':(exclude)**/AGENTS.md' \
            ':(exclude).github/workflows/**' \
            ':(exclude)uv.lock')
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No code changes detected, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            echo "$CHANGED"
            # Save filtered diff for Claude and changed file list for PR body
            git diff "$BASE" HEAD \
              -- . \
              ':(exclude)**/AGENTS.md' \
              ':(exclude).github/workflows/**' \
              ':(exclude)uv.lock' > /tmp/diff.patch
            echo "$CHANGED" > /tmp/changed-files.txt
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Run Claude Code
        if: steps.changes.outputs.skip != 'true'
        timeout-minutes: 15
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          PROMPT=$(cat <<'PROMPT'
          You are updating AGENTS.md files in the Prefect repository after a merge to main.

          Read the skill file at .claude/skills/agents-md-sync/SKILL.md and follow its workflow exactly.

          The diff from the latest push is saved at /tmp/diff.patch — read that file.
          The changed file list is saved at /tmp/changed-files.txt — read that file too.

          Treat AGENTS.md files as rare, durable operating manuals for future agents, not changelogs for the triggering diff.

          Process:
          1. Identify candidate updates before editing.
          2. Apply only high-confidence, minimal edits that document lasting guidance:
             - architectural boundaries
             - non-obvious invariants
             - cross-file contracts
             - recurring failure modes
             - commands or conventions future agents are likely to need
          3. Reject instead of editing when the proposed guidance:
             - documents one helper/function's current control flow
             - restates a docstring, inline comment, test name, or obvious code structure
             - only matters to the triggering PR
             - is niche incident context without a broader editing rule
             - uses broad absolutes like "always" without naming relevant exceptions
          4. Skip edits that are merely reactive, obvious from code, too specific to the triggering diff, file lists, temporary bug context, or notes about every new module.
          5. If confidence is low, or the useful update would be too large for a small AGENTS.md PR, write the recommendation to /tmp/agents-md-recommendations.md instead of editing.
          6. If you change any AGENTS.md file, write /tmp/agents-md-justification.md before or alongside the edits. Include one entry per changed AGENTS.md file or per accepted update, using exactly this structure:
             Path: <AGENTS.md path>
             Proposed text: <brief description or exact text>
             Non-obvious evidence: <why this is not obvious from code/comments/tests/docs>
             Cross-cutting scope: <what subsystem/pattern this applies to beyond one helper>
             Why not code comment/docstring: <why AGENTS.md is the right location>
             Durability: <why this should remain useful after the triggering PR is old>
             Counter-evidence checked: <nearby code/comments/docstrings/tests/AGENTS content checked>
          7. New AGENTS.md files should be rare. Create one only for a real ownership boundary with hidden conventions or pitfalls that are not quick to learn from code. If you create a new AGENTS.md, write /tmp/new-agents-justification.txt with:
             Path: <path>
             Ownership boundary: <why this directory owns distinct guidance>
             Hidden conventions: <the non-obvious conventions, contracts, or pitfalls documented>

          Keep automatic edits small enough to pass these guardrails:
          - no more than 2 AGENTS.md files changed
          - existing AGENTS.md edits add no more than 10 net lines total
          - every new AGENTS.md has the justification file described above

          If no high-confidence minimal update is needed, do not edit.

          After applying any updates, write a single-line, descriptive PR title to /tmp/pr-title.txt
          that summarizes what you changed and why. The title should:
          - Start with the prefix "docs: "
          - Be at most 80 characters
          - Describe the substance of the update (e.g. what new module, command, or convention the AGENTS.md files now reflect), not just a file count
          - Use imperative mood (e.g. "docs: document new runner layer in server AGENTS.md")
          If you did not make any changes, do not write the file.
          PROMPT
          )

          npx -y @anthropic-ai/claude-code --print \
            --dangerously-skip-permissions \
            --max-turns 30 \
            --model sonnet \
            "$PROMPT"

      - name: Check for changes
        if: steps.changes.outputs.skip != 'true'
        id: diff
        run: |
          git add '**/AGENTS.md'
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No AGENTS.md changes needed."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "AGENTS.md changes detected:"
            git diff --cached --name-only
          fi

      - name: Judge AGENTS.md update
        if: steps.changes.outputs.skip != 'true' && steps.diff.outputs.has_changes == 'true'
        timeout-minutes: 10
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          PROMPT=$(cat <<'PROMPT'
          You are the second-pass quality judge for an automated AGENTS.md update in the Prefect repository.

          Default to FAIL. Pass only if every staged AGENTS.md addition is durable, non-obvious, cross-cutting, and not already discoverable from nearby code, comments, docstrings, tests, or existing AGENTS.md content.

          Read all of:
          - /tmp/diff.patch
          - /tmp/changed-files.txt
          - /tmp/agents-md-justification.md
          - the staged AGENTS.md diff from `git diff --cached`
          - any relevant changed code, docs, tests, comments, docstrings, or existing AGENTS.md content needed to verify duplication or obviousness

          You must not edit repository files, stage files, commit, or push. Only write /tmp/agents-md-quality.txt.

          Write /tmp/agents-md-quality.txt with first line exactly PASS or FAIL. Include concise reasons after the first line. Use FAIL if the justification is missing, if any addition documents one helper/function, restates existing comments/docstrings/tests/obvious code structure, only matters to the triggering PR, records niche incident context without a broader editing rule, or uses broad absolutes without relevant exceptions.
          PROMPT
          )

          npx -y @anthropic-ai/claude-code --print \
            --dangerously-skip-permissions \
            --max-turns 20 \
            --model sonnet \
            "$PROMPT"

      - name: Review AGENTS.md changes
        if: steps.changes.outputs.skip != 'true' && steps.diff.outputs.has_changes == 'true'
        id: quality
        run: |
          if [ -s /tmp/agents-md-recommendations.md ]; then
            echo "Skipped AGENTS.md recommendations:"
            cat /tmp/agents-md-recommendations.md
          fi

          CHANGED_AGENTS=$(git diff --cached --name-only | grep -E '(^|/)AGENTS\.md$' || true)
          FILE_COUNT=$(printf '%s\n' "$CHANGED_AGENTS" | sed '/^$/d' | wc -l | tr -d ' ')
          NET_EXISTING_LINES=0
          NEW_AGENTS=()
          VIOLATIONS=()

          if [ ! -s /tmp/agents-md-justification.md ]; then
            VIOLATIONS+=("missing or empty /tmp/agents-md-justification.md")
          fi

          if [ ! -s /tmp/agents-md-quality.txt ]; then
            VIOLATIONS+=("missing or empty /tmp/agents-md-quality.txt")
          else
            echo "AGENTS.md judge result:"
            cat /tmp/agents-md-quality.txt
            echo
            JUDGE_RESULT=$(head -n 1 /tmp/agents-md-quality.txt | tr -d '\r')
            if [ "$JUDGE_RESULT" != "PASS" ]; then
              VIOLATIONS+=("Claude judge did not pass AGENTS.md update")
            fi
          fi

          while IFS=$'\t' read -r additions deletions path; do
            [ -n "$path" ] || continue
            status=$(git diff --cached --name-status -- "$path" | awk '{print $1}')
            if [[ "$status" == A* ]]; then
              NEW_AGENTS+=("$path")
            else
              NET_EXISTING_LINES=$((NET_EXISTING_LINES + additions - deletions))
            fi
          done < <(git diff --cached --numstat -- ':(glob)**/AGENTS.md' AGENTS.md)

          if [ "$FILE_COUNT" -gt 2 ]; then
            VIOLATIONS+=("changed ${FILE_COUNT} AGENTS.md files; maximum is 2")
          fi

          if [ "$NET_EXISTING_LINES" -gt 10 ]; then
            VIOLATIONS+=("added ${NET_EXISTING_LINES} net lines to existing AGENTS.md files; maximum is 10")
          fi

          if [ "${#NEW_AGENTS[@]}" -gt 0 ]; then
            if [ ! -s /tmp/new-agents-justification.txt ]; then
              VIOLATIONS+=("created new AGENTS.md without /tmp/new-agents-justification.txt")
            else
              for path in "${NEW_AGENTS[@]}"; do
                line_count=$(wc -l < "$path" | tr -d ' ')
                if [ "$line_count" -gt 80 ]; then
                  VIOLATIONS+=("new ${path} is ${line_count} lines; maximum is 80")
                fi
                if ! grep -Fxq "Path: ${path}" /tmp/new-agents-justification.txt; then
                  VIOLATIONS+=("new ${path} missing explicit justification entry")
                fi
              done
              if ! grep -q "Ownership boundary:" /tmp/new-agents-justification.txt ||
                 ! grep -q "Hidden conventions:" /tmp/new-agents-justification.txt; then
                VIOLATIONS+=("new AGENTS.md justification must explain ownership boundary and hidden conventions")
              fi
            fi
          fi

          if [ "${#VIOLATIONS[@]}" -gt 0 ]; then
            echo "AGENTS.md update rejected by quality gate:"
            printf ' - %s\n' "${VIOLATIONS[@]}"
            echo
            echo "Rejected diff summary:"
            git diff --cached --stat
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "AGENTS.md quality gate passed."
          echo "valid=true" >> "$GITHUB_OUTPUT"

      - name: Log skipped AGENTS.md recommendations
        if: steps.changes.outputs.skip != 'true' && steps.diff.outputs.has_changes != 'true'
        run: |
          if [ -s /tmp/agents-md-recommendations.md ]; then
            echo "Skipped AGENTS.md recommendations:"
            cat /tmp/agents-md-recommendations.md
          fi

      - name: Create pull request
        if: steps.changes.outputs.skip != 'true' && steps.diff.outputs.has_changes == 'true' && steps.quality.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH="claude/update-agents-md-${SHORT_SHA}"

          # Prefer the PR title Claude Code wrote based on the substance of its
          # changes. Fall back to a generic title only if Claude did not supply one.
          if [ -s /tmp/pr-title.txt ]; then
            PR_TITLE=$(head -n 1 /tmp/pr-title.txt | tr -d '\r' | cut -c1-120)
          fi
          if [ -z "${PR_TITLE:-}" ]; then
            PR_TITLE="docs: update AGENTS.md files for ${SHORT_SHA}"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git commit -m "$PR_TITLE"
          git push origin "$BRANCH"

          python - <<'PY' > /tmp/pr-body.md
          import html
          import os
          from pathlib import Path

          changed_files = Path("/tmp/changed-files.txt").read_text()
          justification = Path("/tmp/agents-md-justification.md").read_text()

          print(f"""Automated AGENTS.md update triggered by commit {os.environ["GITHUB_SHA"]}.

          This PR was generated by Claude Code analyzing the diff from the latest push to main and updating any stale AGENTS.md files.

          <details>
          <summary>Why this belongs in AGENTS.md</summary>

          <pre>
          {html.escape(justification)}
          </pre>
          </details>

          <details>
          <summary>Changed files in triggering push</summary>

          ```text
          {changed_files}
          ```
          </details>""")
          PY

          gh pr create \
            --title "$PR_TITLE" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH" \
            --label "agents-md" \
            --draft
