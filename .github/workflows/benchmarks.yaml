name: Benchmarks

env:
  PY_COLORS: 1

on:
  pull_request:
    paths:
      - .github/workflows/benchmarks.yaml
      - .github/workflows/python-tests.yaml
      - benches/cli-bench.toml
      - "src/prefect/**/*.py"
      - pyproject.toml
      - uv.lock
      - Dockerfile
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  run-benchmarks:
    name: Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install the project
        run:  uv sync --group benchmark --compile-bytecode --locked

      - name: Prepare benchmark comparisons
        # Note: We use a "cache" instead of artifacts because artifacts are not available
        #       across workflow runs.
        id: bench-cache
        uses: actions/cache@v5
        with:
          path: ./.benchmarks
          # Pushes benchmark results for this branch and sha, this will always be a cache miss
          # and `restore-keys` will be used to get the benchmarks for comparison
          key: ${{ runner.os }}-${{ github.head_ref || 'main' }}-${{ github.sha }}
          # Pulls benchmark results for the base branch
          restore-keys: |
            ${{ runner.os }}-${{ github.base_ref }}-
            ${{ runner.os }}-main-

      - name: Start server
        run: |
          PREFECT_HOME=$(pwd) uv run prefect server start&
          PREFECT_API_URL="http://127.0.0.1:4200/api" uv run ./scripts/wait-for-server.py

          # TODO: Replace `wait-for-server` with dedicated command
          #       https://github.com/PrefectHQ/prefect/issues/6990

      - name: Run benchmarks
        env:
          HEAD_REF: ${{ github.head_ref }}
          GITHUB_SHA: ${{ github.sha }}
        # Includes comparison to previous benchmarks if available
        # Import benchmark is ignored because because we run those
        # benchmarks via CodSpeed
        run: |
          if [[ -z "$HEAD_REF" ]]; then
            # HEAD_REF is unset or empty, use 'main' with the SHA
            uniquename="main-$GITHUB_SHA"
          else
            # HEAD_REF is set, use the branch name directly
            uniquename="$HEAD_REF"
          fi

          # Allow alphanumeric, underscores, and dashes, and replace other
          # characters with an underscore
          sanitized_uniquename="${uniquename//[^a-zA-Z0-9_\-]/_}"

          PREFECT_API_URL="http://127.0.0.1:4200/api" \
          uv run python -m benches \
          --ignore=benches/bench_import.py \
          --timeout=180 \
          --benchmark-save="${sanitized_uniquename}" \
          ${{ steps.bench-cache.outputs.cache-hit && '--benchmark-compare' || '' }}

  cli-benchmark-runs:
    name: CLI startup benchmark run (${{ matrix.target }})
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target: [base, head]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install hyperfine
        run: |
          sudo apt-get update
          sudo apt-get install -y hyperfine

      - name: Select benchmark target
        id: target
        run: |
          if [[ "${{ matrix.target }}" == "base" ]]; then
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "output=baseline.json" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "output=comparison.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout target commit
        run: |
          git fetch origin "${{ steps.target.outputs.sha }}"
          git checkout --detach "${{ steps.target.outputs.sha }}"

      - name: Extract cli-bench config from head
        run: |
          git fetch origin ${{ github.event.pull_request.head.sha }}
          git show ${{ github.event.pull_request.head.sha }}:benches/cli-bench.toml > "$RUNNER_TEMP/cli-bench.toml"
          echo "Using benches/cli-bench.toml from ${{ github.event.pull_request.head.sha }}"
          cat "$RUNNER_TEMP/cli-bench.toml"

      - name: Install dependencies
        run: uv sync --group cli-bench --locked

      - name: Run benchmark suite
        run: |
          uv run --group cli-bench cli-bench \
            --config "$RUNNER_TEMP/cli-bench.toml" \
            --project-root "$GITHUB_WORKSPACE" \
            run \
            --runs 5 \
            --category startup \
            --output "${{ steps.target.outputs.output }}"

      - name: Upload benchmark shard
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cli-benchmark-${{ matrix.target }}
          path: ${{ steps.target.outputs.output }}

  cli-benchmarks:
    name: CLI startup benchmarks
    if: ${{ github.event_name == 'pull_request' }}
    needs: [cli-benchmark-runs]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --group cli-bench --locked

      - name: Download baseline results
        uses: actions/download-artifact@v5
        with:
          name: cli-benchmark-base
          path: artifacts/base

      - name: Download head results
        uses: actions/download-artifact@v5
        with:
          name: cli-benchmark-head
          path: artifacts/head

      - name: Check for regressions
        run: |
          uv run --group cli-bench cli-bench compare \
            artifacts/base/baseline.json artifacts/head/comparison.json \
            --threshold 15 \
            --fail-on-regression \
            --summary-md cli-benchmark-compare.md \
            --digest-json cli-benchmark-digest.json

      - name: Upload benchmark summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cli-benchmark-results
          path: |
            artifacts/base/baseline.json
            artifacts/head/comparison.json
            cli-benchmark-compare.md
            cli-benchmark-digest.json
