name: Update docs for code changes

on:
  push:
    branches: [main]
    paths:
      - 'src/prefect/**'
      - 'src/integrations/**'
    paths-ignore:
      - '**/tests/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: docs-update
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for source code changes
        id: changes
        run: |
          # Use the full push range to catch all commits, not just the last one.
          # For workflow_dispatch, fall back to diffing against the previous commit.
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi

          CHANGED=$(git diff --name-only "$BASE" HEAD \
            -- 'src/prefect/' 'src/integrations/' \
            ':(exclude)**/tests/**' \
            ':(exclude)**/*.md')
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No source code changes detected, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            echo "$CHANGED"
            # Save filtered diff for Claude and changed file list for PR body
            git diff "$BASE" HEAD \
              -- 'src/prefect/' 'src/integrations/' \
              ':(exclude)**/tests/**' \
              ':(exclude)**/*.md' > /tmp/diff.patch
            echo "$CHANGED" > /tmp/changed-files.txt
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Run Claude Code
        if: steps.changes.outputs.skip != 'true'
        timeout-minutes: 15
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          PROMPT='You are updating Prefect documentation after a merge to main.

          You are running in EDIT MODE — apply fixes directly, do not just report.

          Read the skill file at .claude/skills/document-changes/SKILL.md and follow its workflow.
          Also read .claude/skills/write-docs/SKILL.md for doc conventions.

          The diff from the latest push is saved at /tmp/diff.patch — read that file.
          Apply any needed documentation fixes directly. If none are needed, do nothing.

          For missing coverage that would require new pages, do not create them.
          Instead, write a summary of recommendations to /tmp/missing-coverage.txt.'

          npx -y @anthropic-ai/claude-code --print \
            --dangerously-skip-permissions \
            --max-turns 30 \
            --model sonnet \
            "$PROMPT"

      - name: Check for changes
        if: steps.changes.outputs.skip != 'true'
        id: diff
        run: |
          git add 'docs/'
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No documentation changes needed."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Documentation changes detected:"
            git diff --cached --name-only
          fi

      - name: Create pull request
        if: steps.changes.outputs.skip != 'true' && steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH="claude/update-docs-${SHORT_SHA}"
          CHANGED_FILES=$(cat /tmp/changed-files.txt)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git commit -m "Update docs for ${SHORT_SHA}"
          git push origin "$BRANCH"

          # Include missing coverage recommendations if they exist
          MISSING_COVERAGE=""
          if [ -f /tmp/missing-coverage.txt ] && [ -s /tmp/missing-coverage.txt ]; then
            MISSING_COVERAGE="

          ## Missing coverage recommendations

          The following new features have no documentation yet and may need new pages or sections:

          $(cat /tmp/missing-coverage.txt)"
          fi

          PR_BODY="Automated documentation update triggered by commit ${GITHUB_SHA}.

          This PR was generated by Claude Code analyzing source code changes and updating any stale documentation.

          <details>
          <summary>Source files changed in triggering push</summary>

          \`\`\`
          ${CHANGED_FILES}
          \`\`\`
          </details>${MISSING_COVERAGE}"

          gh pr create \
            --title "Update docs for ${SHORT_SHA}" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH"
